name: Android Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          TAG="${{ github.ref_name }}"
          if [ "$TAG" = "" ] || [ "$TAG" = "refs/heads/${{ github.ref_name }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/recur-${TAG}.apk
          echo "APK_TAG=${TAG}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.APK_TAG }}
          name: Recur ${{ env.APK_TAG }}
          files: build/app/outputs/flutter-apk/recur-${{ env.APK_TAG }}.apk
          generate_release_notes: true
